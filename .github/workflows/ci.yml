name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      mysql:
        image: mysql:8
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: marwa_test
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 -proot"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10

    steps:
      - uses: actions/checkout@v4

      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          coverage: none
          extensions: pdo, pdo_mysql, json

      - uses: ramsey/composer-install@v3

      - name: Run lint
        run: composer lint

      - name: Run static analysis
        run: composer analyze

      - name: Run unit tests
        run: composer test:unit

      - name: Run integration tests
        env:
          MARWA_DB_INTEGRATION: '1'
          MARWA_DB_HOST: 127.0.0.1
          MARWA_DB_PORT: 3306
          MARWA_DB_DATABASE: marwa_test
          MARWA_DB_USERNAME: root
          MARWA_DB_PASSWORD: root
        run: composer test:integration
